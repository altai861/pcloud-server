<main class="setup-page">
  <header class="page-header">
    <section class="logo-panel">
      <h1>PCloud</h1>
      <p>Admin Launch</p>
    </section>

    <div class="header-actions">
      <button
        type="button"
        class="theme-toggle"
        [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
        [title]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="toggleTheme()"
      >
        <img
          class="theme-toggle-icon"
          [src]="isDarkMode ? 'light-mode.png' : 'dark-mode.png'"
          [alt]="isDarkMode ? 'Light mode icon' : 'Dark mode icon'"
        />
      </button>
    </div>
  </header>

  <section class="main-panel" *ngIf="loading">
    <p>Checking setup status...</p>
  </section>

  <section class="main-panel" *ngIf="!loading && isInitialized">
    <h2>System Already Initialized</h2>
    <p class="hint">
      Initial setup is complete. This launch page is only used for first-time initialization.
    </p>
  </section>

  <form class="main-panel" *ngIf="!loading && !isInitialized" (ngSubmit)="submit()">
    <div class="columns">
      <section class="column">
        <h2>Create the first admin account</h2>

        <label>
          Username
          <input name="username" [(ngModel)]="form.admin.username" required />
        </label>

        <label>
          Email
          <input name="email" type="email" [(ngModel)]="form.admin.email" required />
        </label>

        <label>
          Full name
          <input name="fullName" [(ngModel)]="form.admin.fullName" required />
        </label>

        <label>
          Password
          <input name="password" type="password" [(ngModel)]="form.admin.password" required />
        </label>

        <label>
          Confirm password
          <input
            name="passwordConfirmation"
            type="password"
            [(ngModel)]="form.admin.passwordConfirmation"
            required
          />
        </label>
      </section>

      <section class="column">
        <h2>Select storage settings</h2>

        <label>
          Storage root path
          <input
            name="storageRootPath"
            [(ngModel)]="form.system.storageRootPath"
            placeholder="/home/altai/pcloud/"
            required
          />
        </label>

        <label>
          Total cloud limit (friendly)
          <input
            name="totalStorageLimitInput"
            type="text"
            [(ngModel)]="form.system.totalStorageLimitInput"
            (ngModelChange)="onFriendlyLimitChange()"
            placeholder="500GB / 1.5TB / 800GiB"
          />
          <span class="input-hint">You can type units like KB, MB, GB, TB, KiB, MiB, GiB.</span>
        </label>

        <label>
          Total cloud limit (bytes)
          <input
            name="totalStorageLimitBytes"
            type="text"
            inputmode="numeric"
            [(ngModel)]="form.system.totalStorageLimitBytes"
            (ngModelChange)="onBytesLimitChange()"
            placeholder="500000000000"
          />
          <span class="input-hint">Edit bytes directly if you prefer exact value.</span>
        </label>
      </section>
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

    <footer class="action-panel">
      <button type="submit" [disabled]="submitting">
        {{ submitting ? 'Initializing...' : 'Launch' }}
      </button>
    </footer>
  </form>
</main>
