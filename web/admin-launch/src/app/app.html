<main class="setup-page">
  <header class="page-header">
    <section class="logo-panel">
      <h1>PCloud</h1>
      <p>{{ 'title.launch' | t }}</p>
    </section>

    <div class="header-actions">
      <button
        type="button"
        class="lang-toggle"
        [attr.aria-label]="currentLanguage === 'en' ? ('lang.switchToMongolian' | t) : ('lang.switchToEnglish' | t)"
        [title]="currentLanguage === 'en' ? ('lang.switchToMongolian' | t) : ('lang.switchToEnglish' | t)"
        (click)="toggleLanguage()"
      >
        <img
          class="lang-toggle-icon"
          [src]="currentLanguage === 'en' ? 'mongolian.png' : 'english.png'"
          [alt]="currentLanguage === 'en' ? ('lang.switchToMongolian' | t) : ('lang.switchToEnglish' | t)"
        />
      </button>
      <button
        type="button"
        class="theme-toggle"
        [attr.aria-label]="isDarkMode ? ('theme.switchToLight' | t) : ('theme.switchToDark' | t)"
        [title]="isDarkMode ? ('theme.switchToLight' | t) : ('theme.switchToDark' | t)"
        (click)="toggleTheme()"
      >
        <img
          class="theme-toggle-icon"
          [src]="isDarkMode ? 'light-mode.png' : 'dark-mode.png'"
          [alt]="isDarkMode ? ('theme.lightIcon' | t) : ('theme.darkIcon' | t)"
        />
      </button>
    </div>
  </header>

  <section class="main-panel" *ngIf="loading">
    <p>{{ 'status.checking' | t }}</p>
  </section>

  <section class="main-panel" *ngIf="!loading && isInitialized">
    <h2>{{ 'status.initializedTitle' | t }}</h2>
    <p class="hint">
      {{ 'status.initializedBody' | t }}
    </p>
  </section>

  <form class="main-panel" *ngIf="!loading && !isInitialized" (ngSubmit)="submit()">
    <div class="columns">
      <section class="column">
        <h2>{{ 'form.adminTitle' | t }}</h2>

        <label>
          {{ 'form.username' | t }}
          <input name="username" [(ngModel)]="form.admin.username" required />
        </label>

        <label>
          {{ 'form.email' | t }}
          <input name="email" type="email" [(ngModel)]="form.admin.email" required />
        </label>

        <label>
          {{ 'form.fullName' | t }}
          <input name="fullName" [(ngModel)]="form.admin.fullName" required />
        </label>

        <label>
          {{ 'form.password' | t }}
          <input name="password" type="password" [(ngModel)]="form.admin.password" required />
        </label>

        <label>
          {{ 'form.confirmPassword' | t }}
          <input
            name="passwordConfirmation"
            type="password"
            [(ngModel)]="form.admin.passwordConfirmation"
            required
          />
        </label>
      </section>

      <section class="column">
        <h2>{{ 'form.systemTitle' | t }}</h2>

        <label>
          {{ 'form.storageRootPath' | t }}
          <input
            name="storageRootPath"
            [(ngModel)]="form.system.storageRootPath"
            placeholder="/home/altai/pcloud/"
            required
          />
        </label>

        <label>
          {{ 'form.friendlyLimit' | t }}
          <input
            name="totalStorageLimitInput"
            type="text"
            [(ngModel)]="form.system.totalStorageLimitInput"
            (ngModelChange)="onFriendlyLimitChange()"
            [placeholder]="'form.friendlyLimitPlaceholder' | t"
          />
          <span class="input-hint">{{ 'form.friendlyLimitHint' | t }}</span>
        </label>

        <label>
          {{ 'form.bytesLimit' | t }}
          <input
            name="totalStorageLimitBytes"
            type="text"
            inputmode="numeric"
            [(ngModel)]="form.system.totalStorageLimitBytes"
            (ngModelChange)="onBytesLimitChange()"
            [placeholder]="'form.bytesLimitPlaceholder' | t"
          />
          <span class="input-hint">{{ 'form.bytesLimitHint' | t }}</span>
        </label>
      </section>
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

    <footer class="action-panel">
      <button type="submit" [disabled]="submitting">
        {{ submitting ? ('form.initializing' | t) : ('form.launch' | t) }}
      </button>
    </footer>
  </form>
</main>
