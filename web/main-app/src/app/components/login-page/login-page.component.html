<main class="client-shell">
  <section class="top-actions">
    <button
      type="button"
      class="lang-toggle"
      [attr.aria-label]="currentLanguage === 'en' ? ('lang.switchToMongolian' | t) : ('lang.switchToEnglish' | t)"
      [title]="currentLanguage === 'en' ? ('lang.switchToMongolian' | t) : ('lang.switchToEnglish' | t)"
      (click)="toggleLanguage()"
    >
      <img
        class="lang-toggle-icon"
        [src]="currentLanguage === 'en' ? 'mongolian.png' : 'english.png'"
        [alt]="currentLanguage === 'en' ? ('lang.switchToMongolian' | t) : ('lang.switchToEnglish' | t)"
      />
    </button>
    <button
      type="button"
      class="theme-toggle"
      [attr.aria-label]="isDarkMode ? ('theme.switchToLight' | t) : ('theme.switchToDark' | t)"
      [title]="isDarkMode ? ('theme.switchToLight' | t) : ('theme.switchToDark' | t)"
      (click)="toggleTheme()"
    >
      <img
        class="theme-toggle-icon"
        [src]="isDarkMode ? 'light-mode.png' : 'dark-mode.png'"
        [alt]="isDarkMode ? ('theme.lightIcon' | t) : ('theme.darkIcon' | t)"
      />
    </button>
  </section>

  <header class="logo-card">
    <h1>PCloud</h1>
  </header>

  <section class="login-card" *ngIf="checkingStatus">
    <p>{{ 'login.checking' | t }}</p>
  </section>

  <form class="login-card" *ngIf="!checkingStatus" (ngSubmit)="submit()">
    <label>
      {{ 'login.username' | t }}
      <input
        name="username"
        type="text"
        autocomplete="username"
        [(ngModel)]="form.username"
        required
      />
    </label>

    <label>
      {{ 'login.password' | t }}
      <input
        name="password"
        type="password"
        autocomplete="current-password"
        [(ngModel)]="form.password"
        required
      />
    </label>

    <p class="error" *ngIf="loginErrorMessage">{{ loginErrorMessage }}</p>
    <p class="error" *ngIf="!isInitialized">{{ 'login.initRequired' | t }}</p>

    <footer class="action-panel">
      <button type="submit" [disabled]="loginSubmitting || !isInitialized">
        {{ loginSubmitting ? ('login.signingIn' | t) : ('login.signIn' | t) }}
      </button>
    </footer>
  </form>
</main>
