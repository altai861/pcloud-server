<section class="profile-wrap">
  <p class="status" *ngIf="loading">Loading profile...</p>
  <p class="status error" *ngIf="!loading && errorMessage">{{ errorMessage }}</p>

  <article class="profile-card" *ngIf="!loading && !errorMessage && currentUser">
    <header>
      <img
        [class.default-avatar]="!profileImageSrc"
        [src]="profileImageSrc ?? 'profile.png'"
        alt="Profile"
      />
      <div>
        <h2>{{ currentUser.fullName }}</h2>
        <p>{{ currentUser.username }}</p>
      </div>
    </header>

    <dl>
      <div>
        <dt>Role</dt>
        <dd>{{ currentUser.role }}</dd>
      </div>
      <div>
        <dt>Storage used</dt>
        <dd>{{ formatSize(currentUser.storageUsedBytes) }}</dd>
      </div>
      <div>
        <dt>Storage quota</dt>
        <dd>{{ formatSize(currentUser.storageQuotaBytes) }}</dd>
      </div>
    </dl>

    <section class="upload-section">
      <label for="profileImageInput">Profile image</label>
      <input
        id="profileImageInput"
        type="file"
        accept="image/png,image/jpeg,image/webp,image/gif"
        [disabled]="uploadingImage"
        (change)="onProfileImageSelected($event)"
      />
      <p class="status error" *ngIf="imageErrorMessage">{{ imageErrorMessage }}</p>
      <p class="status success" *ngIf="imageSuccessMessage">{{ imageSuccessMessage }}</p>
    </section>

    <button type="button" (click)="signOut()">Sign out</button>
  </article>
</section>
